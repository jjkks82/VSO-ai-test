<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VSO AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ─────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      border-bottom: 1px solid #e5e5e5;
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -0.3px;
    }

    header h1 span {
      color: #10a37f;
    }

    /* ─── Messages Area ───────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    .msg-row {
      display: flex;
      width: 100%;
    }

    .msg-row.user  { justify-content: flex-start; }
    .msg-row.bot   { justify-content: flex-end; }

    .bubble {
      max-width: min(75%, 640px);
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.65;
      word-break: break-word;
    }

    .msg-row.user .bubble {
      background: #f4f4f4;
      color: #1a1a1a;
      border-bottom-right-radius: 4px;
    }

    .msg-row.bot .bubble {
      background: #10a37f;
      color: #ffffff;
      border-bottom-left-radius: 4px;
    }

    /* ─── Typing indicator ────────────────────────────── */
    .typing-bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: #10a37f;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
    }

    .dot {
      width: 7px; height: 7px;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* ─── Welcome screen ──────────────────────────────── */
    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 20px;
      gap: 12px;
      color: #666;
    }

    #welcome .logo {
      font-size: 42px;
      font-weight: 700;
      color: #10a37f;
      letter-spacing: -1px;
    }

    #welcome p {
      font-size: 15px;
      color: #888;
      max-width: 320px;
    }

    /* ─── Input Bar ───────────────────────────────────── */
    footer {
      padding: 12px 16px 20px;
      background: #ffffff;
      border-top: 1px solid #e5e5e5;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 760px;
      margin: 0 auto;
      background: #f4f4f4;
      border: 1.5px solid #e0e0e0;
      border-radius: 14px;
      padding: 8px 8px 8px 14px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: #10a37f;
      background: #ffffff;
    }

    #userInput {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      max-height: 140px;
      min-height: 24px;
      color: #1a1a1a;
      font-family: inherit;
      direction: rtl;
    }

    #userInput::placeholder { color: #aaa; }

    #sendBtn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: none;
      background: #10a37f;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    #sendBtn:hover  { background: #0d8f6e; }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { background: #c0c0c0; cursor: not-allowed; }

    #sendBtn svg { width: 18px; height: 18px; }

    /* ─── Responsive ──────────────────────────────────── */
    @media (max-width: 480px) {
      .bubble { max-width: 88%; font-size: 14px; }
      header h1 { font-size: 16px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>VSO <span>AI</span></h1>
  </header>

  <div id="messages">
    <div id="welcome">
      <div class="logo">VSO</div>
      <p>مرحباً! كيف يمكنني مساعدتك اليوم؟</p>
    </div>
  </div>

  <footer>
    <div class="input-wrapper">
      <textarea
        id="userInput"
        rows="1"
        placeholder="اكتب رسالتك هنا..."
      ></textarea>
      <button id="sendBtn" title="إرسال">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </footer>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('userInput');
    const sendBtn    = document.getElementById('sendBtn');
    const welcomeEl  = document.getElementById('welcome');

    function hideWelcome() {
      if (welcomeEl) welcomeEl.style.display = 'none';
    }

    function appendMessage(role, text) {
      hideWelcome();
      const row    = document.createElement('div');
      const bubble = document.createElement('div');
      row.classList.add('msg-row', role);
      bubble.classList.add('bubble');
      bubble.textContent = text;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollToBottom();
      return row;
    }

    function showTyping() {
      hideWelcome();
      const row    = document.createElement('div');
      const bubble = document.createElement('div');
      row.classList.add('msg-row', 'bot');
      bubble.classList.add('typing-bubble');
      bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollToBottom();
      return row;
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function autoResize() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      appendMessage('user', text);
      const typingRow = showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        typingRow.remove();

        if (data.reply) {
          appendMessage('bot', data.reply);
        } else {
          appendMessage('bot', 'عذراً، حدث خطأ: ' + (data.error || 'غير معروف'));
        }
      } catch (err) {
        typingRow.remove();
        appendMessage('bot', 'تعذّر الاتصال بالخادم. يرجى المحاولة لاحقاً.');
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    inputEl.addEventListener('input', autoResize);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>

</body>
</html>
